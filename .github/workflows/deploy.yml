name: Deploy Vue to EC2 (Static)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            cd ~/Company-Profile

            echo "=== Git pull ==="
            git pull origin main

            echo "=== Install dependencies ==="
            npm ci

            echo "=== Build project ==="
            npm run build

            echo "=== Verifikasi dist/ ==="
            ls -la ~/Company-Profile/dist/

            echo "=== Deploy ke web root ==="
            sudo rm -rf /var/www/html/*
            sudo cp -r ~/Company-Profile/dist/. /var/www/html/
            sudo chown -R www-data:www-data /var/www/html
            sudo chmod -R 755 /var/www/html

            echo "=== Reload Nginx ==="
            sudo systemctl reload nginx

            echo "=== Verifikasi /var/www/html ==="
            ls -la /var/www/html/

            echo "=== DEPLOY SELESAI ==="
