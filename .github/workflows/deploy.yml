name: Deploy Vue to EC2 (Static)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Clean temp folder on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            rm -rf /home/${{ secrets.SSH_USER }}/deploy_temp
            mkdir -p /home/${{ secrets.SSH_USER }}/deploy_temp

      - name: Upload build to temp folder
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "dist/*" # pakai wildcard, bukan "dist/"
          target: "/home/${{ secrets.SSH_USER }}/deploy_temp"
          strip_components: 1 # strip prefix "dist" dari "dist/index.html" → "index.html"

      - name: Replace web root safely
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            echo "=== Isi deploy_temp ==="
            ls -la /home/${{ secrets.SSH_USER }}/deploy_temp/

            # Pastikan deploy_temp tidak kosong sebelum hapus web root
            if [ -z "$(ls -A /home/${{ secrets.SSH_USER }}/deploy_temp/)" ]; then
              echo "ERROR: deploy_temp kosong, deploy dibatalkan"
              exit 1
            fi

            sudo rm -rf /var/www/html/*
            sudo cp -r /home/${{ secrets.SSH_USER }}/deploy_temp/. /var/www/html/
            sudo chown -R www-data:www-data /var/www/html
            sudo chmod -R 755 /var/www/html
            sudo systemctl reload nginx

            echo "=== Isi /var/www/html ==="
            ls -la /var/www/html/

            rm -rf /home/${{ secrets.SSH_USER }}/deploy_temp
            echo "=== DEPLOY SELESAI ==="
